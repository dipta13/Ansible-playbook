---
- name: Minimal user creation for Ubuntu & RHEL with plaintext password
  hosts: all
  become: yes
  become_method: sudo
  become_user: root        # <-- Equivalent of "sudo su -"
  gather_facts: yes

  vars:
    username: "svctenabletmli"
    plain_password: "P@ssw0rdscanning"   # <-- your plaintext password
    hash_salt: "FixedSalt123"            # <-- keep constant for idempotency

  tasks:
    - name: Select correct admin group (Ubuntu=sudo, RHEL=wheel)
      ansible.builtin.set_fact:
        admin_group: "{{ 'wheel' if ansible_facts.os_family == 'RedHat' else 'sudo' }}"

    - name: Ensure admin group exists (prevents failure if missing)
      ansible.builtin.group:
        name: "{{ admin_group }}"
        state: present

    - name: Create user and add to admin group
      ansible.builtin.user:
        name: "{{ username }}"
        create_home: yes
        shell: /bin/bash
        password: "{{ plain_password | password_hash('sha512', hash_salt) }}"
        update_password: on_create
        groups: "{{ admin_group }}"
        append: yes

    # --- Add sudoers rule: EXACTLY "ALL=(ALL) NOPASSWD: ALL"
    - name: Add user to sudoers with NOPASSWD
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ username }}"
        content: |
          {{ username }} ALL=(ALL) NOPASSWD: ALL
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    # --- Make the password never expire for this user
    - name: Ensure the password never expires
      ansible.builtin.user:
        name: "{{ username }}"
        password_expire_max: -1   # -1 => never expires (same as `chage -M -1`)
