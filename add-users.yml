---
- name: Minimal user creation for Ubuntu & RHEL with plaintext password
  hosts: all
  become: yes
  become_method: sudo
  become_user: root        # <-- This is the correct equivalent of "sudo su -"
  gather_facts: yes


  vars:
    username: "svctenabletmli"
    plain_password: "P@ssw0rdscanning"   # <-- your plaintext password
    hash_salt: "FixedSalt123"            # <-- keep constant for idempotency

  tasks:
    - name: Select correct admin group (Ubuntu=sudo, RHEL=wheel)
      ansible.builtin.set_fact:
        admin_group: "{{ 'wheel' if ansible_facts.os_family == 'RedHat' else 'sudo' }}"

    - name: Ensure admin group exists (prevents failure if missing)
      ansible.builtin.group:
        name: "{{ admin_group }}"
        state: present

    - name: Create user and add to admin group
      ansible.builtin.user:
        name: "{{ username }}"
        create_home: yes
        shell: /bin/bash
        password: "{{ plain_password | password_hash('sha512', hash_salt) }}"
        update_password: on_create
        groups: "{{ admin_group }}"
        append: yes
